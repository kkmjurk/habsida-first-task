<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Log in iinto it</title>
    <link rel="stylesheet" href="./CSS.css">
</head>

<body>

    <div class="main-container">


        <div class="image-section">
            <img src="logo.svg" alt="" class="photo-logo">
            <img src="bg.jpg" alt="Illustration" class="photo">
        </div>


        <div class="form-section">

            <p class="title">Get iintoo it today</p>

            <p class="sub-title">There is no charge or obligation upon registration</p>
            <br>
            <div class="social-buttons">
                <button class="fb">
                    <img src="facebook.svg" alt="">Register with Facebook</button>

                <a href="https://shattereddisk.github.io/rickroll/rickroll.mp4" class="ln" target="_blank">
                    <img src="linkedin.svg" alt="">Register with LinkedIn
                </a>
            </div>
            <br>

            <div class="separator">
                <span class="line"></span>
                <span class="sep-text">OR</span>
                <span class="line"></span>
            </div>

            <div class="inputs">

                <div class="email-input">
                    <label for="input" class="input-text">Email</label>
                    <input type="text" name="input" class="input">
                </div>

                <div class="phone-input">
                    <label for="input" class="input-text">Phone</label>
                    <input type="text" name="input" class="input">
                </div>

            </div>


            <p class="investor">What type of investor are you?</p>

            <p class="select">Select the type of investor you are below.</p>
            <div class="type-boxes">

                <input type="radio" class="checkboxes" name="checkbox1" id="checkbox1" checked>
                <label for="checkbox1">Individual</label>

                <span class="info-trigger">i</span>




                <input type="radio" class="checkboxes" name="checkbox2" id="checkbox2">
                <label for="checkbox2">Business</label>
                <span class="info-trigger">i</span>



                <input type="radio" class="checkboxes" name="checkbox3" id="checkbox3">
                <label for="checkbox3">IRA</label>
                <span class="info-trigger">i</span>

                <input type="radio" class="checkboxes" name="checkbox4" id="checkbox4">
                <label for="checkbox4">Trust</label>
                <span class="info-trigger">i</span>



            </div>
            <br>

            <div class="tooltip">
                I am a natural person investing on my own as a sole owner, joint tenant, or tenant in common.
            </div>

            <br>

            <div class="terms">
                <input type="checkbox" name="checkbox5">
                <label for="checkbox5">I agree to the terms and receiving
                    notifications from iintoo <a href="https://shattereddisk.github.io/rickroll/rickroll.mp4"
                        target="_blank">
                        View fullterms</a></label>
            </div>
            <br>

            <div>
                <button class="Register">Create Account</button>
            </div>
            <br><br>


        </div>
    </div>

</body>




</html>
