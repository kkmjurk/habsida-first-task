<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Log in iinto it</title>
    <link rel="stylesheet" href="./CSS.css">
</head>

<body>

    <div class="main-container">


        <div class="image-section">
            <img src="logo.svg" alt="" class="photo-logo">
            <img src="bg.jpg" alt="Illustration" class="photo">
        </div>


        <div class="form-section">

            <p class="title">Get iintoo it today</p>
            <p class="sub-title">There is no charge or obligation upon registration</p>

            <div class="social-buttons">
                <button class="fb">
                    <img src="facebook.svg" alt="">Register with Facebook</button>
                <button class="ln">
                    <img src="linkedin.svg" alt="">Register with LinkedIn</button>
            </div>
            <br>

            <div class="separator">
                <span>OR</span>
            </div>


            <div class="email-input">
                <label for="input" class="text">Email</label>
                <input type="text" name="input" class="input">
            </div>

            <input type="text" placeholder="Phone">

            <div class="sub-title">
                <p>What type of investor are you?</p>
            </div>


            <p>Select the type of investor you are below.</p>
            <div class="type-boxes">

                <label for="option-item-1">
                    <input type="radio" class="checkboxes" name="checkbox1" value="individual" checked>
                    <span>Individual</span>

                    <span class="info-trigger">i</span>

                    <div class="tooltip">
                        I am a natural person investing on my own as a sole owner, joint tenant, or tenant in common.
                    </div>
                </label>

                <input type="radio" class="checkboxes" name="checkbox2" id="checkbox2">
                <label for="checkbox2">Business</label>
                <span class="info-trigger">i</span>

                <input type="radio" class="checkboxes" name="checkbox3" id="checkbox3">
                <label for="checkbox3">IRA</label>
                <span class="info-trigger">i</span>

                <input type="radio" class="checkboxes" name="checkbox4" id="checkbox4">
                <label for="checkbox4">Trust</label>
                <span class="info-trigger">i</span>

            </div>

            <br>

            <div>
                <input type="checkbox" name="checkbox5" id="checkbox5">
                <label for="checkbox5">I agree to the terms and receiving
                    notifications from iintoo <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">View
                        fullterms</a></label>
            </div>
            <br>

            <div>
                <button class="Register">Create Account</button>
            </div>


        </div>
    </div>

</body>




</html>
